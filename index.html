
    <!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beekeeping Pro - 22:00 Ref & 15 Day Analysis</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #1a73e8; --border: #333; --up: #4caf50; --down: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* Banner 24h */
        .main-yield-banner { background: linear-gradient(135deg, #1e1e1e, #2d2d2d); padding: 20px; border-radius: 15px; margin-bottom: 10px; text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .main-yield-val { font-size: 2.8em; font-weight: bold; }
        .main-yield-label { font-size: 0.7em; color: #888; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }

        /* Συνολική Διαφορά 15 ημερών */
        .total-15d-box { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; border: 1px dashed #444; }
        .total-15d-label { font-size: 0.75em; color: #aaa; text-transform: uppercase; margin-bottom: 3px; }
        .total-15d-val { font-size: 1.4em; font-weight: bold; }

        /* Scrollable History */
        .history-container { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 12px; scrollbar-width: thin; -webkit-overflow-scrolling: touch; }
        .history-day { background: var(--card); min-width: 80px; padding: 12px 6px; border-radius: 12px; border: 1px solid var(--border); text-align: center; flex-shrink: 0; }
        .hist-date { font-size: 0.6em; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        .hist-val { font-size: 0.95em; font-weight: bold; }

        .last-update { font-size: 0.75em; color: #ffca28; text-align: center; margin-bottom: 10px; background: #252525; padding: 8px; border-radius: 10px; border: 1px solid #444; }
        
        /* Toolbar με επιλογή μετρήσεων */
        .toolbar { background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 600px) { .grid-container { grid-template-columns: 1fr 1fr; } }
        
        .card { background: var(--card); border-radius: 15px; padding: 15px; border-top: 5px solid var(--accent); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        h3 { margin: 0; font-size: 0.85em; color: #888; text-transform: uppercase; }
        .value-display { font-size: 2.2em; font-weight: bold; margin: 5px 0; display: flex; align-items: baseline; }
        .stats-row { display: flex; gap: 10px; font-size: 0.75em; color: #777; margin-bottom: 10px; border-top: 1px solid #2a2a2a; padding-top: 5px; }
        .chart-box { width: 100%; height: 160px; }
        select { background: #333; color: white; border: none; padding: 8px; border-radius: 8px; font-size: 11px; outline: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-yield-banner">
        <div class="main-yield-label">ΔΙΑΦΟΡΑ 24Ω (22:00-22:00)</div>
        <div id="24hYieldMain" class="main-yield-val">--</div>
    </div>

    <div class="total-15d-box">
        <div class="total-15d-label">Συνολική Μεταβολή 15 Ημερών</div>
        <div id="total15d" class="total-15d-val">--</div>
    </div>

    <div style="font-size: 0.7em; color: #888; margin-bottom: 5px; text-align: center; text-transform: uppercase;">Ιστορικό 15 Ημερών (gr)</div>
    <div class="history-container" id="historyLog"></div>

    <div class="last-update" id="mainUpdate">🕒 Φόρτωση...</div>

    <div class="toolbar">
        <span style="font-size: 0.75em; color: #888;">Προβολή στο Διάγραμμα:</span>
        <select id="resultsRange" onchange="loadData()">
            <option value="10">10 μετρήσεις</option>
            <option value="20" selected>20 μετρήσεις</option>
            <option value="30">30 μετρήσεις</option>
            <option value="50">50 μετρήσεις</option>
        </select>
    </div>

    <div id="dashboard" class="grid-container"></div>

    <script>
        const channelID = '2061494'; 
        const readAPIKey = '0P6LKRYHCCU5TFKT';

        const fieldConfig = {
            'field1': { label: 'Βάρος', unit: 'gr', icon: '⚖️', color: '#ff5252', decimals: 0 },
            'field5': { label: 'Διαφορά (gr)', unit: 'gr', icon: '📉', color: '#ff4081', decimals: 0, specialDots: true, dynamicColor: true },
            'field2': { label: 'Υγρασία', unit: '%', icon: '💧', color: '#448aff', decimals: 1 },
            'field3': { label: 'Θερμοκρασία', unit: '°C', icon: '🌡️', color: '#4caf50', decimals: 1 },
            'field4': { label: 'Μπαταρία', unit: 'V', icon: '🔋', color: '#ffc107', decimals: 2 },
            'field6': { label: 'GSM Signal', unit: 'dBm', icon: '📶', color: '#00bcd4', decimals: 0 }
        };

        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(() => { loadData(); updateHistory(); });

        async function updateHistory() {
            try {
                const res = await fetch(`https://api.thingspeak.com/channels/${channelID}/fields/1.json?api_key=${readAPIKey}&results=1500`);
                const data = await res.json();
                const feeds = data.feeds;
                if(!feeds) return;

                const getWeightAt22 = (date) => {
                    const target = new Date(date);
                    target.setHours(22, 0, 0); // Ρυθμίστηκε στις 22:00
                    const closest = feeds.reduce((prev, curr) => 
                        Math.abs(new Date(curr.created_at) - target) < Math.abs(new Date(prev.created_at) - target) ? curr : prev
                    );
                    return parseFloat(closest.field1);
                };

                let sum15 = 0;
                const historyLog = document.getElementById('historyLog');
                historyLog.innerHTML = '';

                for (let i = 0; i < 15; i++) {
                    const d0 = new Date(); d0.setDate(d0.getDate() - i);
                    const d1 = new Date(); d1.setDate(d1.getDate() - (i + 1));
                    const diff = parseFloat((getWeightAt22(d0) - getWeightAt22(d1)).toFixed(0));
                    sum15 += diff;

                    if(i === 0) {
                        const mainEl = document.getElementById('24hYieldMain');
                        mainEl.innerText = `${diff > 0 ? '+' : ''}${diff} gr`;
                        mainEl.style.color = diff >= 0 ? '#4caf50' : '#ff5252';
                    }

                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'history-day';
                    dayDiv.innerHTML = `<div class="hist-date">${d0.toLocaleDateString('el-GR', {weekday:'short', day:'numeric'})}</div><div class="hist-val" style="color:${diff >= 0 ? '#4caf50' : '#ff5252'}">${diff > 0 ? '+' : ''}${diff}g</div>`;
                    historyLog.appendChild(dayDiv);
                }

                const total15El = document.getElementById('total15d');
                total15El.innerText = `${sum15 > 0 ? '+' : ''}${sum15.toFixed(0)} gr`;
                total15El.style.color = sum15 >= 0 ? '#4caf50' : '#ff5252';

            } catch(e) { console.error(e); }
        }

        function loadData() {
            const num = document.getElementById('resultsRange').value;
            fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPIKey}&results=${num}`)
            .then(res => res.json()).then(data => {
                if(!data.feeds || !data.feeds.length) return;
                const lastFeed = data.feeds[data.feeds.length - 1];
                const lastDate = new Date(lastFeed.created_at);
                document.getElementById('mainUpdate').innerText = `🕒 Τελευταία: ${lastDate.toLocaleTimeString('el-GR', {hour:'2-digit', minute:'2-digit'})}`;
                
                const dashboard = document.getElementById('dashboard');
                dashboard.innerHTML = '';
                Object.keys(fieldConfig).forEach(key => {
                    const conf = fieldConfig[key];
                    const vals = data.feeds.map(f => parseFloat(f[key])).filter(v => !isNaN(v));
                    if(!vals.length) return;
                    const lastVal = vals[vals.length-1];
                    
                    let displayColor = conf.color;
                    if(conf.dynamicColor) {
                        displayColor = lastVal >= 0 ? '#4caf50' : '#ff5252';
                    }

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="header-flex"><h3>${conf.label}</h3><span>${conf.icon}</span></div>
                        <div class="value-display" style="color:${displayColor}">
                            ${lastVal.toFixed(conf.decimals)}<span style="font-size:0.4em; color:#666; margin-left:5px;">${conf.unit || ''}</span>
                        </div>
                        <div class="stats-row"><span>MIN: ${Math.min(...vals).toFixed(conf.decimals)}</span><span>MAX: ${Math.max(...vals).toFixed(conf.decimals)}</span></div>
                        <div id="chart_${key}" class="chart-box"></div>
                    `;
                    dashboard.appendChild(card);
                    drawChart(data.feeds, key, conf);
                });
            });
        }

        function drawChart(feeds, key, conf) {
            const dataTable = new google.visualization.DataTable();
            dataTable.addColumn('string', 'Time');
            dataTable.addColumn('number', conf.label);
            if (conf.specialDots) dataTable.addColumn({type: 'string', role: 'style'});

            feeds.forEach(f => {
                let v = parseFloat(f[key]);
                if (!isNaN(v)) {
                    if (conf.specialDots) {
                        const dotColor = v >= 0 ? 'point { size: 7; fill-color: #4caf50; stroke-width: 0; }' : 'point { size: 7; fill-color: #ff5252; stroke-width: 0; }';
                        dataTable.addRow([new Date(f.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), v, dotColor]);
                    } else {
                        dataTable.addRow([new Date(f.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), v]);
                    }
                }
            });

            new google.visualization.LineChart(document.getElementById('chart_'+key)).draw(dataTable, {
                backgroundColor: 'transparent', curveType: 'function', legend: 'none',
                pointSize: 5,
                hAxis: { textPosition: 'none' }, vAxis: { gridlines: {color:'#2a2a2a'}, textStyle: {color:'#555'} },
                colors: [conf.specialDots ? '#607d8b' : conf.color], 
                chartArea: {width:'95%', height:'80%'}
            });
        }
        setInterval(() => { loadData(); updateHistory(); }, 60000);
    </script>
</body>
</html>
